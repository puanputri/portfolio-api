apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-api
  namespace: default
  labels:
    app: portfolio-api
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio-api
  template:
    metadata:
      labels:
        app: portfolio-api
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/q/metrics"
        prometheus.io/port: "8080"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001

      containers:
        - name: portfolio-api
          image: ghcr.io/puanputri/portfolio-api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          # Inject non-secret config from ConfigMap
          envFrom:
            - configMapRef:
                name: portfolio-api-config

          # Inject secrets individually
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: portfolio-api-secret
                  key: DB_PASSWORD
            - name: MAILER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: portfolio-api-secret
                  key: MAILER_PASSWORD

          # Resource limits
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          # Liveness probe — application is alive
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          # Readiness probe — application can serve traffic
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          # Startup probe — allow time for JVM warmup / DB migration
          startupProbe:
            httpGet:
              path: /q/health/started
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

      restartPolicy: Always
      terminationGracePeriodSeconds: 30
