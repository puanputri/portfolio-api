apiVersion: v1
kind: Secret
metadata:
  name: portfolio-api-secret
  namespace: default
  labels:
    app: portfolio-api
type: Opaque
# Values below are base64-encoded placeholders.
# Replace with real values before applying:
#   echo -n 'your-actual-password' | base64
# Then apply: kubectl apply -f k8s/secret.yaml
#
# IMPORTANT: Do NOT commit real secrets to source control.
# Use a secrets manager (e.g., Vault, AWS Secrets Manager, Sealed Secrets).
data:
  # base64("changeme") = "Y2hhbmdlbWU="  ← REPLACE BEFORE DEPLOYING
  DB_PASSWORD: "Y2hhbmdlbWU="

  # base64("changeme") = "Y2hhbmdlbWU="  ← REPLACE BEFORE DEPLOYING
  MAILER_PASSWORD: "Y2hhbmdlbWU="
