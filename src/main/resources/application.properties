# ============================================================
# portfolio-api — main application configuration
# ============================================================

# --------------- HTTP ---------------
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# --------------- CORS ---------------
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000,https://puanputri.dev,https://www.puanputri.dev
quarkus.http.cors.methods=GET,POST,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization,X-Forwarded-For
quarkus.http.cors.exposed-headers=Content-Disposition
quarkus.http.cors.access-control-max-age=24H

# --------------- DataSource ---------------
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/portfolio}
quarkus.datasource.username=${DB_USERNAME:portfolio_user}
quarkus.datasource.password=${DB_PASSWORD:changeme}
quarkus.datasource.jdbc.min-size=2
quarkus.datasource.jdbc.max-size=10

# --------------- Hibernate ORM ---------------
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.dialect=org.hibernate.dialect.PostgreSQLDialect

# --------------- Flyway ---------------
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration
quarkus.flyway.baseline-on-migrate=true

# --------------- Mailer ---------------
quarkus.mailer.host=${MAILER_HOST:smtp.gmail.com}
quarkus.mailer.port=${MAILER_PORT:587}
quarkus.mailer.username=${MAILER_USERNAME:puanputrisaqinahf@gmail.com}
quarkus.mailer.password=${MAILER_PASSWORD:changeme}
quarkus.mailer.ssl=${MAILER_SSL:false}
quarkus.mailer.start-tls=${MAILER_STARTTLS:REQUIRED}
quarkus.mailer.from=${MAILER_FROM:no-reply@puanputri.dev}

# --------------- OpenAPI / Swagger UI ---------------
quarkus.smallrye-openapi.info-title=Portfolio API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Backend API for Puan Putri developer portfolio site
quarkus.smallrye-openapi.info-contact-email=puanputrisaqinahf@gmail.com
quarkus.smallrye-openapi.info-contact-name=Puan Putri
quarkus.smallrye-openapi.info-license-name=MIT
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# --------------- Health ---------------
quarkus.smallrye-health.root-path=/q/health

# --------------- Metrics ---------------
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics

# --------------- Logging (structured JSON) ---------------
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{3.}] (%t) %s%e%n
quarkus.log.console.json=true
quarkus.log.console.json.pretty-print=false
quarkus.log.console.json.exception-output-type=formatted
quarkus.log.level=${LOG_LEVEL:INFO}
quarkus.log.category."dev.puanputri".level=${LOG_LEVEL:INFO}

# --------------- Application-level config ---------------
portfolio.contact.notification-email=${CONTACT_NOTIFICATION_EMAIL:puanputrisaqinahf@gmail.com}
