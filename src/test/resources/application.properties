# ============================================================
# portfolio-api — test profile overrides
# ============================================================

# --------------- DataSource (H2 in-memory) ---------------
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:portfolio_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
quarkus.datasource.username=sa
quarkus.datasource.password=

# --------------- Hibernate ORM ---------------
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.dialect=org.hibernate.dialect.H2Dialect
quarkus.hibernate-orm.log.sql=false

# --------------- Flyway (disable for tests — Hibernate manages schema) ---------------
quarkus.flyway.migrate-at-start=false

# --------------- Mailer (mock mode — no real SMTP) ---------------
quarkus.mailer.mock=true

# --------------- Logging ---------------
quarkus.log.console.json=false
quarkus.log.level=INFO
quarkus.log.category."dev.puanputri".level=DEBUG

# --------------- Rate limiter reset between tests ---------------
# Tests inject RateLimiterService directly and call resetAll()
